# Install this file on secure.techoverfl.com. The listener is reachable only
# through WireGuard. The default server exposes only the existing utility and
# Vision Genesis locations. The named ops server is the sole route to the
# Portainer worker NodePort pool. Unexpected hosts fail closed.
map $http_upgrade $tof_ops_connection_upgrade {
    default upgrade;
    '' close;
}

upstream tof_portainer_workers {
    least_conn;
    server 192.168.15.42:30779 max_fails=2 fail_timeout=15s;
    server 192.168.15.43:30779 max_fails=2 fail_timeout=15s;
    server 192.168.15.44:30779 max_fails=2 fail_timeout=15s;
    keepalive 16;
}

server {
    listen 10.77.0.2:8443;
    server_name _;

    set_real_ip_from 10.77.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    server_tokens off;
    client_max_body_size 256k;

    location = /_edge/health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    include /etc/nginx/snippets/ai-gateway-locations.conf;
    include /etc/nginx/snippets/vision-genesis-locations.conf;

    location / {
        return 404;
    }
}

server {
    listen 10.77.0.2:8443;
    server_name ops.ai.techoverfl.com;

    set_real_ip_from 10.77.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    server_tokens off;
    client_max_body_size 64m;

    location / {
        proxy_pass https://tof_portainer_workers;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $tof_ops_connection_upgrade;

        # Portainer currently serves its generated certificate for localhost
        # and 0.0.0.0 only. Keep the LAN hop encrypted without claiming that
        # certificate provides hostname authentication. Replace this with a
        # trusted internal certificate before enabling upstream verification.
        proxy_ssl_verify off;

        proxy_connect_timeout 3s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }
}
