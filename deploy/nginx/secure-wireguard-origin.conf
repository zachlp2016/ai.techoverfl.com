# Install this file on secure.techoverfl.com. The listener is reachable only
# through WireGuard and exposes the existing utility and Vision Genesis
# locations plus a private edge health check. All other paths return 404.
server {
    listen 10.77.0.2:8443;
    server_name _;

    set_real_ip_from 10.77.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    server_tokens off;
    client_max_body_size 256k;

    location = /_edge/health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    include /etc/nginx/snippets/ai-gateway-locations.conf;
    include /etc/nginx/snippets/vision-genesis-locations.conf;

    location / {
        return 404;
    }
}
